openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Public statistics
paths:
  /stats/public:
    get:
      operationId: getPublicStats
      tags: [stats]
      summary: 공개 통계
      description: 유저 수·정답 수·퀴즈 수 등 공개 통계를 반환한다. 인증 불필요.
      responses:
        "200":
          description: 통계 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /kakao/relic-ranking:
    get:
      operationId: getRelicRanking
      tags: [stats]
      summary: 실효 전투력 랭킹
      description: 메인 유물 100% + 보관 유물 스택 적용 실효 전투력 기준 전체 랭킹
      responses:
        "200":
          description: 실효 전투력 랭킹 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattlePowerRankingResponse"
  /kakao/superpower-ranking:
    get:
      operationId: getSuperpowerRanking
      tags: [stats]
      summary: 초능력자 종합 랭킹
      description: 포인트 + 유물자산가치 + log10(1+전투력)×K 종합 순위
      responses:
        "200":
          description: 초능력자 종합 랭킹 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperpowerRankingResponse"
  /kakao/relic-asset-ranking:
    get:
      operationId: getRelicAssetRanking
      tags: [stats]
      summary: 유물 자산가치 랭킹
      description: 유물 획득·강화·레벨업·합성에 투자한 포인트 누적 자산가치 기준 랭킹
      responses:
        "200":
          description: 유물 자산가치 랭킹 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelicAssetRankingResponse"
  /kakao/combined-ranking:
    get:
      operationId: getCombinedRanking
      tags: [stats]
      summary: 통합 랭킹 (레거시)
      description: 포인트(70%)와 유물 전투력(30%)을 가중합산한 통합점수 기준 랭킹
      responses:
        "200":
          description: 통합 랭킹 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CombinedRankingResponse"
components:
  schemas:
    PublicStats:
      type: object
      properties:
        userCount:
          type: integer
          description: 전체 유저 수
        quizCount:
          type: integer
          description: 등록 퀴즈 수
        totalAnswers:
          type: integer
          description: 전체 시도 수
        totalCorrect:
          type: integer
          description: 전체 정답 수
        totalScore:
          type: number
          description: 총 포인트 유통량
        totalVisits:
          type: integer
          description: 총 사이트 방문 수
        todayVisits:
          type: integer
          description: 금일 사이트 방문 수
        todayActiveUsers:
          type: integer
          description: 오늘 활동한 유저 수
      required: [userCount, quizCount, totalAnswers, totalCorrect, totalScore, totalVisits, todayVisits, todayActiveUsers]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BattlePowerRankEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        nickname:
          type: string
        totalPower:
          type: number
          description: "실효 전투력 합계 (메인+보관 스택 적용)"
        mainPower:
          type: number
          description: "메인 유물 전투력"
        storagePowerApplied:
          type: number
          description: "보관함 유물 실효 전투력 (스택 규칙·비율 적용)"
      required: [rank, userId, nickname, totalPower, mainPower, storagePowerApplied]
    BattlePowerRankingResponse:
      type: object
      properties:
        ranking:
          type: array
          items:
            $ref: "#/components/schemas/BattlePowerRankEntry"
        updatedAt:
          type: string
      required: [ranking, updatedAt]
    SuperpowerRankEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        nickname:
          type: string
        superpowerScore:
          type: number
          description: "종합 초능력 점수 = 포인트 + 유물자산 + log보너스"
        pointScore:
          type: number
          description: "포인트 (P)"
        relicAssetScore:
          type: number
          description: "유물 자산가치 합계 (P)"
        battlePowerBonus:
          type: number
          description: "전투력 로그 보너스 = round(K × log10(1+totalPower))"
        totalPower:
          type: number
          description: "실효 전투력"
        mainPower:
          type: number
        storagePowerApplied:
          type: number
      required: [rank, userId, nickname, superpowerScore, pointScore, relicAssetScore, battlePowerBonus, totalPower, mainPower, storagePowerApplied]
    SuperpowerRankingResponse:
      type: object
      properties:
        ranking:
          type: array
          items:
            $ref: "#/components/schemas/SuperpowerRankEntry"
        updatedAt:
          type: string
      required: [ranking, updatedAt]
    RelicAssetRankEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        nickname:
          type: string
        relicAssetScore:
          type: number
          description: "유물 자산가치 합계 (P)"
        relicCount:
          type: integer
          description: "보유 유물 수"
        topRelicGrade:
          type: integer
          description: "최고 등급 유물 등급 (1=D, 5=S)"
      required: [rank, userId, nickname, relicAssetScore, relicCount, topRelicGrade]
    RelicAssetRankingResponse:
      type: object
      properties:
        ranking:
          type: array
          items:
            $ref: "#/components/schemas/RelicAssetRankEntry"
        updatedAt:
          type: string
      required: [ranking, updatedAt]
    RelicRankEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        nickname:
          type: string
        relicPower:
          type: number
          description: "유물 전투력 합산"
        effectSum:
          type: number
          description: "유물 효과 합산 (%)"
        relicScore:
          type: integer
          description: "유물 통합점수 = effectSum×1400 + relicPower×15.6 (P 단위)"
      required: [rank, userId, nickname, relicPower, effectSum, relicScore]
    CombinedRankEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        nickname:
          type: string
        score:
          type: number
          description: 포인트 (P)
        relicPower:
          type: number
          description: 유물 전투력 합산
        effectSum:
          type: number
          description: 유물 효과 합산 (%)
        combinedScore:
          type: number
          description: "통합점수 = 포인트 + effectSum×1400 + relicPower×15.6 (P 단위 절대값)"
      required: [rank, userId, nickname, score, relicPower, effectSum, combinedScore]
    CombinedRankingResponse:
      type: object
      properties:
        ranking:
          type: array
          items:
            $ref: "#/components/schemas/CombinedRankEntry"
        updatedAt:
          type: string
      required: [ranking, updatedAt]
